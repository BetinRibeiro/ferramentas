<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Acadêmico - Rogoberto Silva</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --text: #333;
            --info: #2980b9; 
            --purple: #8e44ad;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .perfil-aluno {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .perfil-aluno div span {
            display: block;
            font-size: 0.75rem;
            color: #bdc3c7;
            text-transform: uppercase;
        }

        .perfil-aluno div strong {
            font-size: 1rem;
        }

        .section-title {
            max-width: 1200px;
            margin: 20px auto 10px auto;
            width: 100%;
            font-weight: bold;
            color: var(--primary);
            border-left: 5px solid var(--accent);
            padding-left: 10px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            flex-grow: 1;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 5px solid var(--accent);
            display: flex;
            flex-direction: column;
            word-wrap: break-word;
        }

        .card.critico { border-top-color: var(--danger); }
        .card.concluido { border-top-color: var(--success); }
        .card.historico { border-top-color: var(--purple); }

        h2 {
            font-size: 1.05rem;
            margin-top: 0;
            color: var(--primary);
            min-height: 2.5em;
            line-height: 1.3;
        }

        .score-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            margin-bottom: 15px;
            border: 1px solid #eee;
        }

        .score-box span {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent);
        }

        .details {
            font-size: 0.85rem;
            flex-grow: 1;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            gap: 10px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .badge-pendente { background: var(--warning); color: white; }
        .badge-ok { background: var(--success); color: white; }
        .badge-info { background: var(--info); color: white; }
        .badge-extra { background: var(--purple); color: white; }

        .footer-card {
            margin-top: 15px;
            font-size: 0.8rem;
            font-style: italic;
            color: #666;
            line-height: 1.4;
        }

        footer {
            margin-top: 30px;
            padding: 20px;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
            text-align: left;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
            width: 100%;
            box-sizing: border-box;
        }

        .footer-title {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .container { grid-template-columns: 1fr; }
            body { padding: 10px; }
            header h1 { font-size: 1.5rem; }
            .perfil-aluno { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Dashboard Acadêmico - ADS</h1>
    <p>Acompanhamento de Pontuação e Histórico</p>
</header>

<div class="section-title">METAS DO SEMESTRE ATUAL (PONTUAÇÃO)</div>
<div class="container" id="dashboard"></div>

<div class="section-title">HISTÓRICO ESCOLAR COMPLETO (INTEGRALIZAÇÃO)</div>
<div class="container" id="historico"></div>


<script>
    // Seus dados atuais mantidos intactos
    const dados = [
        { nome: "DESENVOLVIMENTO RESPONSIVO", conquistado: 11000, max: 11000, itens: { "Portfólio": 2000, "AVA": 2000, "Engajamento": 2000, "Prova": 5000 }, prova: "Mín: 1500" },
        { nome: "DESENVOLVIMENTO MOBILE", conquistado: 11000, max: 11000, itens: { "Portfólio": 2000, "AVA": 2000, "Engajamento": 2000, "Prova": 5000 }, prova: "Mín: 1500" },
        { nome: "SISTEMAS DISTRIBUÍDOS", conquistado: 4800, max: 11000, itens: { "Portfólio": 2000, "AVA":  1000, "Engajamento": 1800, "Prova":  "25/04/2026" }, prova: "Mín: 1500" },
        { nome: "PRIVACIDADE E PROTEÇÃO DE DADOS", conquistado: 5000, max: 10000, itens: { "AVA": 3000, "Engajamento": 2000, "Prova": "09/05/2026" }, prova: "Mín: 1500" },
        { nome: "SISTEMAS OPERACIONAIS", conquistado: 7000, max: 12000, itens: { "Portfólio": 2000, "AVA": 3000, "Engajamento": 2000, "Prova": "09/05/2026" }, prova: "Mín: 1500" },
        { nome: "ENGENHARIA DE SOFTWARE", conquistado: 6500, max: 12000, itens: { "AVA": 4500, "Engajamento": 2000, "Prova": "09/05/2026" }, prova: "Mín: 1500" },
        { nome: "GREEN IT", conquistado: 6500, max: 10000, itens: { "AVA": 4500, "Engajamento": 2000, "Prova": "09/05/2026" }, prova: "Mín: 1500" },
        { nome: "PROJETO DE EXTENSÃO I", conquistado: 10000, max: 10000, itens: { "Portfólio Único":  10000 }, prova: "N/A" },
        { nome: "PROJETO DE EXTENSÃO II", conquistado: 10000, max: 10000, itens: { "Portfólio Único":  10000 }, prova: "N/A" }
    ];

    // Novo array com os dados do Histórico Escolar
    const historicoDados = [
        { nome: "PROJETO INTEGRADO SÍNTESE", nota: "10", status: "APROVADO", ch: "70h" },
        { nome: "ARQUITETURA E ORG. DE COMPUTADORES", nota: "8.4", status: "APROVEITAMENTO", ch: "60h" },
        { nome: "INTERFACE E USABILIDADE", nota: "6.7", status: "APROVEITAMENTO", ch: "60h" },
        { nome: "PROJETO DE SOFTWARE", nota: "8.5", status: "APROVADO", ch: "60h" },
        { nome: "REDES DE COMPUTADORES", nota: "9.1", status: "APROVEITAMENTO", ch: "60h" },
        { nome: "SEGURANÇA E AUDITORIA DE SISTEMAS", nota: "10", status: "APROVADO", ch: "60h" },
        { nome: "PROJETO INTEGRADO INOVAÇÃO", nota: "10", status: "APROVADO", ch: "70h" },
        { nome: "ALGORITMOS E PROG. ESTRUTURADA", nota: "5.0", status: "APROVEITAMENTO", ch: "60h" },
        { nome: "ANÁLISE E MODELAGEM DE SISTEMAS", nota: "10", status: "APROVADO", ch: "60h" },
        { nome: "LINGUAGEM DE PROGRAMAÇÃO", nota: "9.3", status: "APROVEITAMENTO", ch: "60h" },
        { nome: "LÓGICA E MATEMÁTICA COMPUTACIONAL", nota: "7.3", status: "APROVEITAMENTO", ch: "60h" },
        { nome: "ANÁLISE ORIENTADA A OBJETOS", nota: "9.0", status: "APROVEITAMENTO", ch: "60h" },
        { nome: "LINGUAGEM ORIENTADA A OBJETOS", nota: "7.0", status: "APROVEITAMENTO", ch: "60h" },
        { nome: "MODELAGEM DE DADOS", nota: "8.3", status: "APROVEITAMENTO", ch: "60h" },
        { nome: "COMPUTAÇÃO EM NUVEM", nota: "10", status: "APROVADO", ch: "60h" },
        { nome: "DESENVOLVIMENTO EM JAVASCRIPT", nota: "10", status: "APROVADO", ch: "60h" },
        { nome: "FRAMEWORKS PARA DESENV. SOFTWARE", nota: "10", status: "APROVADO", ch: "60h" },
        { nome: "PROG. E DESENV. DE BANCO DE DADOS", nota: "8.4", status: "APROVEITAMENTO", ch: "60h" },
        { nome: "PROGRAMAÇÃO WEB", nota: "10", status: "APROVADO", ch: "60h" },
        { nome: "QUALIDADE E AUTOMAÇÃO DE TESTES", nota: "10", status: "APROVADO", ch: "60h" },
        { nome: "PROJETO INTEGRADO INTERDISCIPLINAR", nota: "10", status: "APROVADO", ch: "70h" },
        { nome: "SOCIEDADE BRASILEIRA E CIDADANIA", nota: "7.25", status: "APROVEITAMENTO", ch: "60h" },
        { nome: "ATIVIDADES COMPLEMENTARES", nota: "OK", status: "CONCLUÍDO", ch: "100h" }
    ];

    const containerDashboard = document.getElementById('dashboard');
    const containerHistorico = document.getElementById('historico');

    // Renderiza Metas Atuais
    dados.forEach(disc => {
        const isCritico = disc.conquistado < 3000 && disc.prova !== "N/A";
        const card = document.createElement('div');
        card.className = `card ${isCritico ? 'critico' : ''}`;
        
        let itensHtml = '';
        for (const [key, value] of Object.entries(disc.itens)) {
            let badgeClass = (typeof value === 'number') ? 'badge-ok' : (/\d{2}\/\d{2}\/\d{4}/.test(value) ? 'badge-pendente' : 'badge-info');
            itensHtml += `<div class="item"><span>${key}</span><span class="badge ${badgeClass}">${value}</span></div>`;
        }

        card.innerHTML = `<h2>${disc.nome}</h2><div class="score-box"><span>${disc.conquistado}</span> / ${disc.max} pts</div><div class="details">${itensHtml}</div><div class="footer-card"><strong>Prova Presencial:</strong> ${disc.prova}</div>`;
        containerDashboard.appendChild(card);
    });

    // Renderiza Histórico
    historicoDados.forEach(h => {
        const card = document.createElement('div');
        card.className = `card historico`;
        const badgeStatus = h.status === "APROVADO" ? "badge-ok" : "badge-info";
        
        card.innerHTML = `
            <h2>${h.nome}</h2>
            <div class="score-box">Média Final: <span>${h.nota}</span></div>
            <div class="details">
                <div class="item"><span>Carga Horária</span><span class="badge badge-extra">${h.ch}</span></div>
                <div class="item"><span>Situação</span><span class="badge ${badgeStatus}">${h.status}</span></div>
            </div>
        `;
        containerHistorico.appendChild(card);
    });
</script>

</body>
</html>
