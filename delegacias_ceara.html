    const tabelaCorpo = document.getElementById('tabelaCorpo');
    const buscaGeral = document.getElementById('buscaGeral');
    const filtroUnidade = document.getElementById('filtroUnidade');
    const filtroAIS = document.getElementById('filtroAIS');
    const mensagemErro = document.getElementById('mensagemErro');

    // Função para renderizar a tabela
    function renderizarTabela(lista) {
        tabelaCorpo.innerHTML = "";
        
        if (lista.length === 0) {
            mensagemErro.classList.remove('d-none');
        } else {
            mensagemErro.classList.add('d-none');
            lista.forEach(item => {
                const row = `
                    <tr>
                        <td><strong>${item.unidade}</strong></td>
                        <td><span class="badge bg-primary">AIS ${item.ais}</span></td>
                        <td>${item.telefone}</td>
                        <td><small>${item.email}</small></td>
                        <td>${item.horario}</td>
                        <td>${item.endereco}<br><small class="text-muted">CEP: ${item.cep}</small></td>
                    </tr>
                `;
                tabelaCorpo.innerHTML += row;
            });
        }
    }

    // Função principal de filtragem
    function filtrar() {
        const valGeral = buscaGeral.value.toLowerCase();
        const valUnidade = filtroUnidade.value.toLowerCase();
        const valAIS = filtroAIS.value;

        const dadosFiltrados = dados.filter(item => {
            // Verifica Filtro de Unidade
            const matchUnidade = item.unidade.toLowerCase().includes(valUnidade);
            
            // Verifica Filtro de AIS
            const matchAIS = valAIS === "" || item.ais.toString() === valAIS;

            // Verifica Busca Geral (procura em todas as propriedades do objeto)
            const valoresDeTodasColunas = Object.values(item).join(" ").toLowerCase();
            const matchGeral = valoresDeTodasColunas.includes(valGeral);

            // Retorna verdadeiro apenas se passar nos 3 filtros simultaneamente
            return matchUnidade && matchAIS && matchGeral;
        });

        renderizarTabela(dadosFiltrados);
    }

    // Listeners para atualizar em tempo real enquanto digita
    buscaGeral.addEventListener('input', filtrar);
    filtroUnidade.addEventListener('input', filtrar);
    filtroAIS.addEventListener('change', filtrar);

    // Inicializar tabela
    renderizarTabela(dados);
