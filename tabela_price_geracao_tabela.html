<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Tabela Price</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #16a34a;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            padding: 20px;
            color: #1e293b;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 { text-align: center; color: var(--primary); }
        p.subtitle { text-align: center; color: var(--secondary); margin-bottom: 30px; }

        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-calc { background-color: var(--primary); color: white; }
        .btn-table { background-color: var(--success); color: white; display: none; }
        .btn-print { background-color: var(--secondary); color: white; display: none; }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        #resultado-texto {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-left: 4px solid var(--primary);
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            font-size: 0.9rem;
        }

        th, td {
            border: 1px solid #e2e8f0;
            padding: 12px;
            text-align: right;
        }

        th { background-color: #f1f5f9; text-align: center; }
        tr:nth-child(even) { background-color: #f8fafc; }

        @media print {
            .buttons, .grid-form, .subtitle { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; }
            #resultado-texto { display: block !important; border: 1px solid #ccc; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora Price</h1>
    <p class="subtitle">Preencha 3 campos para calcular o 4º e gerar a tabela.</p>

    <div class="grid-form">
        <div class="input-group">
            <label>Valor Presente (PV)</label>
            <input type="number" id="pv" step="0.01" placeholder="Ex: 10000">
        </div>
        <div class="input-group">
            <label>Parcela (PMT)</label>
            <input type="number" id="pmt" step="0.01" placeholder="Ex: 500">
        </div>
        <div class="input-group">
            <label>Nº de Meses (n)</label>
            <input type="number" id="n" placeholder="Ex: 24">
        </div>
        <div class="input-group">
            <label>Taxa de Juros (% a.m.)</label>
            <input type="number" id="taxa" step="0.0001" placeholder="Ex: 1.5">
        </div>
    </div>

    <div class="buttons">
        <button class="btn-calc" onclick="calcularFaltante()">Calcular Valor Faltante</button>
        <button class="btn-table" id="btn-table" onclick="gerarTabela()">Gerar Tabela Price</button>
        <button class="btn-print" id="btn-print" onclick="window.print()">Imprimir</button>
    </div>

    <div id="resultado-texto"></div>
    <div id="tabela-container"></div>
</div>

<script>
    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
    }

    function calcularFaltante() {
        let pv = parseFloat(document.getElementById('pv').value);
        let pmt = parseFloat(document.getElementById('pmt').value);
        let n = parseFloat(document.getElementById('n').value);
        let i = parseFloat(document.getElementById('taxa').value) / 100;

        const inputs = [
            { id: 'pv', val: pv },
            { id: 'pmt', val: pmt },
            { id: 'n', val: n },
            { id: 'taxa', val: i }
        ];

        const vazios = inputs.filter(input => isNaN(input.val));

        if (vazios.length !== 1) {
            alert("Por favor, preencha exatamente 3 campos para calcular o 4º.");
            return;
        }

        const campoFaltante = vazios[0].id;

        try {
            if (campoFaltante === 'pmt') {
                pmt = pv * ( (i * Math.pow(1 + i, n)) / (Math.pow(1 + i, n) - 1) );
                document.getElementById('pmt').value = pmt.toFixed(2);
            } 
            else if (campoFaltante === 'pv') {
                pv = pmt * ( (Math.pow(1 + i, n) - 1) / (i * Math.pow(1 + i, n)) );
                document.getElementById('pv').value = pv.toFixed(2);
            } 
            else if (campoFaltante === 'n') {
                n = Math.log(pmt / (pmt - pv * i)) / Math.log(1 + i);
                document.getElementById('n').value = Math.round(n);
            } 
            else if (campoFaltante === 'taxa') {
                i = calcularTaxaIterativa(pv, pmt, n);
                document.getElementById('taxa').value = (i * 100).toFixed(4);
            }

            document.getElementById('resultado-texto').style.display = 'block';
            document.getElementById('resultado-texto').innerHTML = `<strong>Cálculo Concluído!</strong> Verifique os valores acima.`;
            document.getElementById('btn-table').style.display = 'inline-block';
            document.getElementById('btn-print').style.display = 'inline-block';
        } catch (e) {
            alert("Erro no cálculo. Verifique se os dados são coerentes.");
        }
    }

    // Método de Newton-Raphson para encontrar a taxa
    function calcularTaxaIterativa(pv, pmt, n) {
        let i = 0.01; // chute inicial 1%
        for (let j = 0; j < 100; j++) {
            let f = pmt * (1 - Math.pow(1 + i, -n)) / i - pv;
            let df = pmt * (n * Math.pow(1 + i, -n - 1) * i - (1 - Math.pow(1 + i, -n))) / (i * i);
            let i_next = i - f / df;
            if (Math.abs(i_next - i) < 0.0000001) return i_next;
            i = i_next;
        }
        return i;
    }

    function gerarTabela() {
        const pv = parseFloat(document.getElementById('pv').value);
        const pmt = parseFloat(document.getElementById('pmt').value);
        const n = parseInt(document.getElementById('n').value);
        const i = parseFloat(document.getElementById('taxa').value) / 100;

        let html = `<table>
            <thead>
                <tr>
                    <th>Mês</th>
                    <th>Prestação</th>
                    <th>Juros</th>
                    <th>Amortização</th>
                    <th>Saldo Devedor</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="text-align:center">0</td>
                    <td>-</td>
                    <td>-</td>
                    <td>-</td>
                    <td>${formatarMoeda(pv)}</td>
                </tr>`;

        let saldoDevedor = pv;
        let totalJuros = 0;

        for (let m = 1; m <= n; m++) {
            let jurosMês = saldoDevedor * i;
            let amortizacaoMês = pmt - jurosMês;
            saldoDevedor -= amortizacaoMês;
            totalJuros += jurosMês;

            // Ajuste de arredondamento no último mês
            if (m === n) {
                saldoDevedor = 0;
            }

            html += `<tr>
                <td style="text-align:center">${m}</td>
                <td>${formatarMoeda(pmt)}</td>
                <td>${formatarMoeda(jurosMês)}</td>
                <td>${formatarMoeda(amortizacaoMês)}</td>
                <td>${formatarMoeda(Math.abs(saldoDevedor))}</td>
            </tr>`;
        }

        html += `</tbody></table>`;
        
        const resumo = `<div style="margin-top:20px; font-weight:bold;">
            Total Pago: ${formatarMoeda(pmt * n)} <br>
            Total de Juros: ${formatarMoeda(totalJuros)}
        </div>`;

        document.getElementById('tabela-container').innerHTML = html + resumo;
    }
</script>

</body>
</html>
