<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maria's Trends - Gestão de Promissórias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none; }
            body { background: white; }
        }
        input:focus { border-color: #ec4899 !important; outline: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-10">

    <div id="app" class="max-w-xl mx-auto bg-white min-h-screen shadow-lg">
        
        <!-- Header -->
        <header class="bg-pink-600 text-white p-4 text-center">
            <h1 class="text-2xl font-bold uppercase tracking-widest italic">Maria's Trends</h1>
            <p class="text-xs">Você sempre entrando na moda.</p>
            <p class="text-[10px] opacity-80 mt-1">Org: Orlando - (27) 99971.2336</p>
        </header>

        <!-- Navegação Simples -->
        <div class="flex border-b no-print">
            <button onclick="changeTab('novo')" class="flex-1 p-3 font-bold border-b-2 border-pink-600" id="tab-novo">Novo Carnê</button>
            <button onclick="changeTab('lista')" class="flex-1 p-3 font-bold text-gray-500" id="tab-lista">Meus Clientes</button>
        </div>

        <!-- Conteúdo: Novo Cadastro -->
        <div id="view-novo" class="p-4 space-y-4">
            <section class="space-y-2">
                <h2 class="text-sm font-bold border-b pb-1 text-pink-600">DADOS DO CLIENTE</h2>
                <input type="text" id="cliente" placeholder="Nome Completo do Cliente" class="w-full p-2 border rounded">
                <div class="flex gap-2">
                    <input type="text" id="cpf" placeholder="CPF" class="w-1/2 p-2 border rounded">
                    <input type="text" id="rg" placeholder="RG" class="w-1/2 p-2 border rounded">
                </div>
                <input type="text" id="endereco" placeholder="Rua / Bairro / Cidade" class="w-full p-2 border rounded">
                <input type="text" id="telefone" placeholder="Telefone / WhatsApp" class="w-full p-2 border rounded">
            </section>

            <section class="space-y-2 pt-2">
                <h2 class="text-sm font-bold border-b pb-1 text-pink-600">DADOS DA COMPRA</h2>
                <input type="text" id="objeto" placeholder="Descrição do Produto (Ex: 1 Cama Queen)" class="w-full p-2 border rounded">
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase">Valor Total</label>
                        <input type="number" id="valorTotal" placeholder="3000.00" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase">Nº de Parcelas</label>
                        <input type="number" id="qtdParcelas" placeholder="12" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase">Data Compra</label>
                        <input type="date" id="dataCompra" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase">1ª Parcela</label>
                        <input type="date" id="dataPrimeira" class="w-full p-2 border rounded">
                    </div>
                </div>
            </section>

            <button onclick="gerarEPersistir()" class="w-full bg-pink-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-pink-700 transition no-print">
                GERAR CARNÊ E SALVAR
            </button>
        </div>

        <!-- Conteúdo: Lista de Clientes -->
        <div id="view-lista" class="hidden p-4">
            <h2 class="font-bold text-gray-700 mb-4">Promissórias Registradas</h2>
            <div id="lista-clientes" class="space-y-3">
                <!-- Inserido via JS -->
            </div>
        </div>

        <!-- View de Visualização/Impressão -->
        <div id="view-detalhe" class="hidden p-4">
            <button onclick="changeTab('lista')" class="mb-4 text-pink-600 font-bold no-print">← Voltar</button>
            <div id="card-impressao" class="border-2 border-black p-4 text-xs">
                <!-- Gerado Dinamicamente -->
            </div>
            <button onclick="window.print()" class="w-full mt-4 bg-gray-800 text-white py-2 rounded no-print">Imprimir / Salvar PDF</button>
        </div>

    </div>

    <script>
        // --- CONFIGURAÇÃO INDEXEDDB ---
        let db;
        const request = indexedDB.open("MariasTrendsDB", 1);

        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("vendas", { keyPath: "id", autoIncrement: true });
        };

        request.onsuccess = (e) => {
            db = e.target.result;
            renderLista();
        };

        // --- LÓGICA DE NAVEGAÇÃO ---
        function changeTab(tab) {
            document.getElementById('view-novo').classList.add('hidden');
            document.getElementById('view-lista').classList.add('hidden');
            document.getElementById('view-detalhe').classList.add('hidden');
            
            document.getElementById('tab-novo').classList.remove('border-pink-600', 'text-pink-600');
            document.getElementById('tab-lista').classList.remove('border-pink-600', 'text-pink-600');

            if(tab === 'novo') {
                document.getElementById('view-novo').classList.remove('hidden');
                document.getElementById('tab-novo').classList.add('border-pink-600', 'text-pink-600');
            } else if (tab === 'lista') {
                document.getElementById('view-lista').classList.remove('hidden');
                document.getElementById('tab-lista').classList.add('border-pink-600', 'text-pink-600');
                renderLista();
            }
        }

        // --- LÓGICA DE NEGÓCIO ---
        function gerarEPersistir() {
            const data = {
                cliente: document.getElementById('cliente').value,
                cpf: document.getElementById('cpf').value,
                endereco: document.getElementById('endereco').value,
                objeto: document.getElementById('objeto').value,
                valorTotal: parseFloat(document.getElementById('valorTotal').value),
                qtdParcelas: parseInt(document.getElementById('qtdParcelas').value),
                dataCompra: document.getElementById('dataCompra').value,
                dataPrimeira: document.getElementById('dataPrimeira').value,
                parcelas: []
            };

            if(!data.cliente || !data.valorTotal) return alert("Preencha os campos principais!");

            const valorParcela = (data.valorTotal / data.qtdParcelas).toFixed(2);
            let dataBase = new Date(data.dataPrimeira + 'T00:00:00');

            for (let i = 1; i <= data.qtdParcelas; i++) {
                const dataParcela = new Date(dataBase);
                dataParcela.setMonth(dataBase.getMonth() + (i - 1));
                
                data.parcelas.push({
                    numero: i,
                    vencimento: dataParcela.toLocaleDateString('pt-BR'),
                    valor: valorParcela,
                    pago: false
                });
            }

            const transaction = db.transaction(["vendas"], "readwrite");
            transaction.objectStore("vendas").add(data);
            transaction.oncomplete = () => {
                alert("Salvo com sucesso!");
                changeTab('lista');
            };
        }

        function renderLista() {
            const container = document.getElementById('lista-clientes');
            container.innerHTML = "";
            
            const store = db.transaction("vendas").objectStore("vendas");
            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const item = cursor.value;
                    container.innerHTML += `
                        <div class="bg-white border-l-4 border-pink-500 p-3 shadow-sm flex justify-between items-center">
                            <div>
                                <p class="font-bold uppercase">${item.cliente}</p>
                                <p class="text-xs text-gray-500">${item.objeto} - Total: R$ ${item.valorTotal.toFixed(2)}</p>
                            </div>
                            <button onclick="verDetalhe(${item.id})" class="text-pink-600 font-bold">VER</button>
                        </div>
                    `;
                    cursor.continue();
                }
            };
        }

        function verDetalhe(id) {
            const store = db.transaction("vendas").objectStore("vendas");
            store.get(id).onsuccess = (e) => {
                const venda = e.target.result;
                const container = document.getElementById('card-impressao');
                
                document.getElementById('view-lista').classList.add('hidden');
                document.getElementById('view-detalhe').classList.remove('hidden');

                let htmlParcelas = '';
                venda.parcelas.forEach(p => {
                    htmlParcelas += `
                        <tr class="border-b">
                            <td class="p-1">${p.numero}/${venda.qtdParcelas}</td>
                            <td class="p-1">${p.vencimento}</td>
                            <td class="p-1 font-bold">R$ ${p.valor}</td>
                            <td class="p-1 border-l text-center">_____/_____</td>
                        </tr>
                    `;
                });

                container.innerHTML = `
                    <div class="flex justify-between items-center mb-4 border-b-2 border-black pb-2">
                        <div class="text-left font-bold italic">MARIA'S TRENDS</div>
                        <div class="text-right">TEL: (27) 99971-2336</div>
                    </div>
                    <div class="space-y-1 mb-4">
                        <p><strong>CLIENTE:</strong> ${venda.cliente.toUpperCase()}</p>
                        <p><strong>CPF:</strong> ${venda.cpf} | <strong>OBJETO:</strong> ${venda.objeto}</p>
                        <p><strong>VALOR TOTAL:</strong> R$ ${venda.valorTotal.toFixed(2)}</p>
                    </div>
                    <table class="w-full border text-[10px]">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="p-1 border text-left">Nº</th>
                                <th class="p-1 border text-left">VENCIMENTO</th>
                                <th class="p-1 border text-left">VALOR (R$)</th>
                                <th class="p-1 border text-left">DATA PAGO</th>
                            </tr>
                        </thead>
                        <tbody>${htmlParcelas}</tbody>
                    </table>
                    <div class="mt-8 flex justify-between">
                        <div class="border-t border-black w-5/12 text-center text-[8px] mt-4">ASS. CLIENTE</div>
                        <div class="border-t border-black w-5/12 text-center text-[8px] mt-4">ASS. VENDEDOR</div>
                    </div>
                `;
            };
        }
    </script>
</body>
</html>
