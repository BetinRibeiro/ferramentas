<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard IBGE - Insights Executivos</title>
    <style>
        :root {
            --primary: #183462;
            --accent: #00d4ff; /* Ciano para destaque */
            --gold: #ffcc00;
            --bg: #f0f2f5;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; color: #333; }
        .card { background: white; width: 100%; max-width: 650px; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        header { background: var(--primary); margin: -30px -30px 25px -30px; padding: 30px; border-radius: 20px 20px 0 0; text-align: center; }
        h2 { color: white; margin: 0; font-weight: 700; letter-spacing: 1px; }

        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #666; font-size: 14px; }
        select, button { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; transition: 0.3s; }
        
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        button:hover { background: #12284b; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(24,52,98,0.3); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        #resultado { margin-top: 25px; display: none; }
        
        /* Estilo dos Cards de Indicadores */
        .grid-indicadores { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .item-card { 
            background: #f8fafc; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary);
            transition: transform 0.3s;
        }
        .item-card:hover { transform: scale(1.03); }
        .item-label { display: block; font-size: 12px; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .item-value { display: block; font-size: 18px; color: var(--primary); font-weight: 800; margin: 4px 0; }
        .item-insight { font-size: 11px; color: #475569; line-height: 1.3; display: block; }

        /* Resumo Analítico Final */
        #analise-box { 
            background: #fff9e6; border: 1px solid #ffeeba; padding: 20px; border-radius: 12px; 
            margin-top: 20px; border-left: 5px solid var(--gold);
        }
        #analise-box h3 { margin-top: 0; color: #856404; font-size: 16px; }
        #analise-texto { font-size: 14px; color: #533f03; line-height: 1.5; }

        .loader { display: none; text-align: center; color: var(--primary); font-weight: bold; margin: 20px 0; }
        
        @media (max-width: 500px) { .grid-indicadores { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="card">
    <header>
        <h2>BRASIL EM DADOS</h2>
    </header>
    
    <div class="field">
        <label>Estado</label>
        <select id="uf"><option value="">Carregando estados...</option></select>
    </div>

    <div class="field">
        <label>Cidade</label>
        <select id="cidade" disabled><option value="">Selecione o estado</option></select>
    </div>

    <button id="btnConsultar" disabled>GERAR INSIGHTS EXECUTIVOS</button>

    <div id="loader" class="loader">Consultando base do IBGE...</div>

    <div id="resultado">
        <div class="grid-indicadores">
            <!-- População -->
            <div class="item-card">
                <span class="item-label">Potencial de Mercado</span>
                <span class="item-value" id="pop">-</span>
                <span class="item-insight" id="insight-pop">Analisando densidade populacional...</span>
            </div>
            
            <!-- PIB -->
            <div class="item-card">
                <span class="item-label">Riqueza Produzida</span>
                <span class="item-value" id="pib">-</span>
                <span class="item-insight" id="insight-pib">Analisando poder de investimento...</span>
            </div>

            <!-- Salário/Massa -->
            <div class="item-card">
                <span class="item-label" id="label-salario">Circulação de Renda</span>
                <span class="item-value" id="salario">-</span>
                <span class="item-insight" id="insight-salario">Analisando massa salarial local...</span>
            </div>

            <!-- Escolarização -->
            <div class="item-card">
                <span class="item-label">Capital Humano</span>
                <span class="item-value" id="escola">-</span>
                <span class="item-insight" id="insight-escola">Nível de base escolar (6-14 anos).</span>
            </div>
        </div>

        <!-- Texto Analítico Final -->
        <div id="analise-box">
            <h3>ANÁLISE ESTRATÉGICA</h3>
            <div id="analise-texto"></div>
        </div>
    </div>
</div>

<script>
    const ufSelect = document.getElementById('uf');
    const cidadeSelect = document.getElementById('cidade');
    const btn = document.getElementById('btnConsultar');
    const resultado = document.getElementById('resultado');
    const loader = document.getElementById('loader');

    // Formatação Padrão 1.000,00
    const fmt = (v, d=2) => {
        let n = parseFloat(v);
        if(isNaN(n)) return v;
        return n.toLocaleString('pt-BR', { minimumFractionDigits: d, maximumFractionDigits: d });
    };

    // 1. Carregar Estados
    fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome')
        .then(r => r.json())
        .then(data => {
            ufSelect.innerHTML = '<option value="">Selecione um estado</option>';
            data.forEach(uf => ufSelect.innerHTML += `<option value="${uf.sigla}">${uf.nome}</option>`);
        });

    // 2. Carregar Cidades
    ufSelect.onchange = async () => {
        cidadeSelect.disabled = true; btn.disabled = true; resultado.style.display = 'none';
        if(!ufSelect.value) return;
        const r = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${ufSelect.value}/municipios`);
        const cidades = await r.json();
        cidadeSelect.innerHTML = '<option value="">Selecione uma cidade</option>';
        cidades.forEach(c => cidadeSelect.innerHTML += `<option value="${c.id}">${c.nome}</option>`);
        cidadeSelect.disabled = false;
    };

    cidadeSelect.onchange = () => btn.disabled = !cidadeSelect.value;

    // 3. Consulta e Lógica Analítica
    btn.onclick = async () => {
        const id = cidadeSelect.value;
        const cidadeNome = cidadeSelect.options[cidadeSelect.selectedIndex].text;
        loader.style.display = 'block';
        resultado.style.display = 'none';

        try {
            const url = `https://servicodados.ibge.gov.br/api/v1/pesquisas/indicadores/29171|47001|29763|60048/resultados/${id}`;
            const response = await fetch(url);
            const data = await response.json();

            const buscar = (idInd) => {
                const ind = data.find(i => i.id === idInd);
                if (!ind) return 0;
                return ind.res[0].res['2022'] || ind.res[0].res['2021'] || ind.res[0].res['2010'] || 0;
            };

            const vPop = parseFloat(buscar(29171));
            const vPib = parseFloat(buscar(47001));
            const vSal = parseFloat(buscar(29763));
            const vEsc = parseFloat(buscar(60048));

            // Exibição dos Valores
            document.getElementById('pop').innerText = fmt(vPop, 0) + ' hab.';
            document.getElementById('pib').innerText = 'R$ ' + fmt(vPib, 2);
            document.getElementById('salario').innerText = fmt(vSal, 1) + (vSal > 50 ? ' SM (Total)' : ' SM (Média)');
            document.getElementById('escola').innerText = fmt(vEsc, 1) + ' %';

            // Lógica de Insights Rápidos
            document.getElementById('insight-pop').innerText = vPop > 150000 ? "Cidade Polo Regional com alto tráfego e demanda digital." : "Mercado local focado em serviços de proximidade.";
            document.getElementById('insight-pib').innerText = vPib > 25000 ? "Poder de investimento empresarial acima da média." : "Economia em desenvolvimento com foco em comércio local.";
            
            // Tratamento do valor atípico de Salário (Massa Salarial vs Média)
            if(vSal > 100) {
                document.getElementById('label-salario').innerText = "Massa Salarial Total";
                document.getElementById('insight-salario').innerText = "Volume total de renda circulante no mercado formal.";
            } else {
                document.getElementById('label-salario').innerText = "Salário Médio";
                document.getElementById('insight-salario').innerText = "Média de ganhos por trabalhador formal.";
            }

            // Geração do Texto Analítico Dinâmico
            let analise = `A cidade de <strong>${cidadeNome}</strong> `;
            
            if(vPop > 200000) analise += `apresenta-se como um robusto <strong>Polo Regional</strong>. Com mais de ${fmt(vPop,0)} habitantes, o município oferece escala para soluções de software B2B e B2C. `;
            else analise += `é um município de médio porte, ideal para validação de produtos e serviços focados em nichos específicos. `;

            if(vPib > 30000) analise += `O PIB per capita de R$ ${fmt(vPib,2)} indica uma economia forte, sugerindo que as empresas locais possuem capital para investir em modernização tecnológica. `;
            else analise += `O PIB de R$ ${fmt(vPib,2)} sugere uma economia baseada em subsistência ou comércio varejista, onde o valor agregado deve ser o foco da venda. `;

            if(vSal > 5000) analise += `O volume de massa salarial é expressivo, o que garante um comércio local pulsante. `;

            if(vEsc < 80) analise += `Um ponto de atenção é o índice de escolarização (${fmt(vEsc,1)}%), o que pode indicar desafios na mão de obra qualificada a longo prazo.`;
            else analise += `O excelente índice de escolarização (${fmt(vEsc,1)}%) reflete uma base educacional sólida na região.`;

            document.getElementById('analise-texto').innerHTML = analise;

            loader.style.display = 'none';
            resultado.style.display = 'block';

        } catch (err) {
            loader.style.display = 'none';
            alert('Falha ao conectar com o IBGE.');
        }
    };
</script>

</body>
</html>
