<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Data Manager - Leads com Telefone</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        customDark: '#183462',
                        whatsappGreen: '#22c55e',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #183462; border-radius: 10px; }
        #loader { backdrop-filter: blur(4px); background-color: rgba(255, 255, 255, 0.8); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <!-- Header -->
    <header class="bg-customDark text-white shadow-xl">
        <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-white/10 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-10V4m0 10V4m-4 10h.01" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Gerenciador de Leads</h1>
                    <p class="text-xs text-blue-200">Apenas empresas com telefone disponível</p>
                </div>
            </div>
            <div id="totalCount" class="bg-white/20 px-4 py-2 rounded-full text-sm font-semibold backdrop-blur-sm border border-white/30">
                Total: 0
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Controls -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 flex flex-col md:flex-row gap-6 items-end">
            <div class="w-full md:w-1/3">
                <label class="block text-sm font-bold text-customDark mb-2 uppercase tracking-wider">Importar JSON (Filtrado)</label>
                <input type="file" id="fileInput" accept=".json" 
                    class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-customDark file:text-white hover:file:bg-blue-900 transition-all cursor-pointer border border-slate-200 rounded-lg p-1">
            </div>
            
            <div class="w-full md:flex-1">
                <label class="block text-sm font-bold text-customDark mb-2 uppercase tracking-wider">Busca Inteligente</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </span>
                    <input type="text" id="searchInput" placeholder="Pesquisar em contatos filtrados..." 
                        class="pl-10 block w-full rounded-lg border border-slate-200 bg-white py-3 px-4 shadow-sm focus:border-customDark focus:ring-1 focus:ring-customDark sm:text-sm outline-none transition-all">
                </div>
            </div>
        </div>

        <!-- Loader -->
        <div id="loader" class="hidden fixed inset-0 z-50 flex items-center justify-center">
            <div class="bg-white p-8 rounded-2xl shadow-2xl flex flex-col items-center border border-slate-100">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-slate-200 border-t-customDark mb-4"></div>
                <span class="font-bold text-customDark">Filtrando contatos válidos...</span>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table id="dataTable" class="w-full text-sm text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 font-bold text-customDark uppercase tracking-wider text-xs">CNPJ / Razão Social</th>
                            <th class="px-6 py-4 font-bold text-customDark uppercase tracking-wider text-xs">Localização</th>
                            <th class="px-6 py-4 font-bold text-customDark uppercase tracking-wider text-xs">Atividade</th>
                            <th class="px-6 py-4 font-bold text-customDark uppercase tracking-wider text-xs">Ação</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <!-- Conteúdo via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="flex flex-col sm:flex-row justify-between items-center mt-8 gap-4">
            <button id="prevBtn" class="w-full sm:w-auto px-6 py-2.5 bg-white border border-slate-200 rounded-xl font-bold text-customDark hover:bg-slate-50 disabled:opacity-30 disabled:cursor-not-allowed shadow-sm transition-all flex items-center justify-center gap-2">
                Anterior
            </button>
            <span id="pageIndicator" class="bg-customDark text-white px-6 py-2 rounded-xl font-bold text-sm shadow-md"> Página 1 </span>
            <button id="nextBtn" class="w-full sm:w-auto px-6 py-2.5 bg-white border border-slate-200 rounded-xl font-bold text-customDark hover:bg-slate-50 disabled:opacity-30 disabled:cursor-not-allowed shadow-sm transition-all flex items-center justify-center gap-2">
                Próximo
            </button>
        </div>
    </main>

<script>
    const DB_NAME = 'BusinessDB_Filtered';
    const DB_VERSION = 1;
    const STORE_NAME = 'companies';
    let db;
    let currentPage = 1;
    const rowsPerPage = 100;
    let currentSearch = "";

    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: "CNPJ" });
        }
    };
    request.onsuccess = (e) => { db = e.target.result; render(); };

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        document.getElementById('loader').classList.remove('hidden');

        reader.onload = async (event) => {
            try {
                const data = JSON.parse(event.target.result);
                // FILTRO: Só aceita itens onde TELEFONE existe e não está vazio
                const filteredData = data.filter(item => 
                    item.TELEFONE && item.TELEFONE.toString().trim() !== ""
                );
                
                await importData(filteredData);
                alert(`${filteredData.length} contatos válidos importados. Itens sem telefone foram descartados.`);
                this.value = '';
            } catch (err) {
                alert("Erro ao processar JSON: " + err.message);
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        };
        reader.readAsText(file);
    });

    async function importData(items) {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], "readwrite");
            const store = transaction.objectStore(STORE_NAME);
            
            // Limpa o banco anterior para garantir que só fiquem os novos filtrados
            store.clear(); 
            
            items.forEach(item => store.put(item));
            transaction.oncomplete = () => {
                currentPage = 1;
                render();
                resolve();
            };
            transaction.onerror = () => reject(transaction.error);
        });
    }

    async function fetchData() {
        return new Promise((resolve) => {
            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();

            request.onsuccess = () => {
                let data = request.result;
                if (currentSearch) {
                    const s = currentSearch.toLowerCase();
                    data = data.filter(item => 
                        Object.values(item).some(val => 
                            val && val.toString().toLowerCase().includes(s)
                        )
                    );
                }
                const total = data.length;
                const paginatedData = data.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);
                resolve({ items: paginatedData, total });
            };
        });
    }

    async function render() {
        const { items, total } = await fetchData();
        const tbody = document.querySelector('#dataTable tbody');
        const totalCountEl = document.getElementById('totalCount');
        
        tbody.innerHTML = items.map(item => {
            const endereco = `${item.LOGRADOURO || ''}, ${item.NUMERO || 'SN'} - ${item.BAIRRO || ''}, ${item.CIDADE || ''}/${item.UF || ''}`;
            const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(endereco)}`;
            const foneLimpo = item.TELEFONE.replace(/\D/g, '');
            const foneLink = `https://wa.me/55${foneLimpo}`;

            return `
            <tr class="hover:bg-slate-50 transition-colors border-b">
                <td class="px-6 py-4">
                    <div class="font-bold text-customDark text-sm">${item.CNPJ}</div>
                    <div class="text-xs text-slate-500 truncate max-w-[200px]">${item["RAZAO SOCIAL"]}</div>
                </td>
                <td class="px-6 py-4">
                    <a href="${mapsUrl}" target="_blank" class="text-xs text-slate-600 hover:text-customDark flex items-start gap-1">
                        <svg class="h-3 w-3 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"/></svg>
                        ${endereco}
                    </a>
                </td>
                <td class="px-6 py-4">
                    <div class="text-[10px] font-bold text-slate-400">${item.CNAE}</div>
                    <div class="text-xs text-slate-600  max-w-[150px]">${item["DESC CNAE"]}</div>
                </td>
                <td class="px-6 py-4">
                    <a href="${foneLink}" target="_blank" class="inline-flex items-center gap-2 px-3 py-2 bg-whatsappGreen text-white rounded-lg text-xs font-bold hover:bg-green-600 transition-transform active:scale-95 shadow-sm">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                        ${item.TELEFONE}
                    </a>
                </td>
            </tr>
            `;
        }).join('');

        totalCountEl.textContent = `Válidos: ${total}`;
        updatePaginationControls(total);
    }

    function updatePaginationControls(total) {
        const maxPage = Math.ceil(total / rowsPerPage) || 1;
        document.getElementById('pageIndicator').textContent = `Página ${currentPage} de ${maxPage}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage >= maxPage;
    }

    document.getElementById('prevBtn').onclick = () => { if (currentPage > 1) { currentPage--; render(); window.scrollTo(0, 0); } };
    document.getElementById('nextBtn').onclick = () => { currentPage++; render(); window.scrollTo(0, 0); };

    let searchTimeout;
    document.getElementById('searchInput').oninput = (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentSearch = e.target.value;
            currentPage = 1;
            render();
        }, 400);
    };
</script>
</body>
</html>
