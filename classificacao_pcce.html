<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Convocação - PC-CE</title>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --dark: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Header & Badges */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
        }
        .ampla { background: #0056b3; color: white; }
        .negro { background: #6f42c1; color: white; }
        .pcd { background: #fd7e14; color: white; }
        .cr { background: #444; color: #ccc; }
        .turma-tag { background: #28a745; color: white; margin-right: 5px; }

        /* Configuração de Turmas */
        .config-section {
            background: var(--card);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .turmas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .turma-card {
            background: #252525;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #444;
        }

        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
        input {
            width: 100%;
            padding: 8px;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* Simulador e Filtros */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        /* Tabela */
        .table-container {
            background: var(--card);
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        th { background: #252525; color: var(--text-muted); font-size: 0.9rem; }
        tr:hover { background: #2a2a2a; }

        /* Paginação */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        .page-btn {
            background: #333;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
        }
        .page-btn.active { background: var(--primary); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Resultado Simulação */
        #sim-result {
            margin-top: 15px;
            padding: 15px;
            background: #1a3a5a;
            border-left: 4px solid var(--primary);
            border-radius: 4px;
            display: none;
        }

        .highlight-row { background: rgba(40, 167, 69, 0.2) !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Simulador PC-CE <small style="font-size: 1rem; color: var(--text-muted);">Configuração de Vagas</small></h1>
        <div>Vagas Totais: <span id="total-vagas-badge" class="badge ampla">0</span></div>
    </div>

    <!-- Gerenciamento de Turmas -->
    <div class="config-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0">Configurar Turmas/Lotes</h2>
            <button class="btn btn-success" onclick="addTurma()">+ Adicionar Turma</button>
        </div>
        <div id="turmas-container" class="turmas-grid"></div>
        <div style="margin-top: 20px;">
            <button class="btn btn-primary" onclick="processSimulation()">Re-Processar Simulação</button>
        </div>
    </div>

    <!-- Filtros e Busca -->
    <div class="config-section">
        <div class="search-box">
            <input type="text" id="sim-input" style="flex: 2;" placeholder="Digite nome ou posição do candidato para projetar...">
            <button class="btn btn-primary" onclick="simulateCandidate()">Projetar Convocação</button>
        </div>
        <div id="sim-result"></div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <div class="search-box">
            <input type="text" id="search-list" style="flex: 1;" placeholder="Filtrar lista abaixo..." oninput="debounceSearch()">
            <select id="turma-filter" class="btn" style="background: #333; color: white;" onchange="applyFilters()">
                <option value="all">Todas as Turmas</option>
            </select>
            <div id="category-filters" style="display: flex; gap: 5px;">
                <button class="btn filter-btn active" data-filter="all">Tudo</button>
                <button class="btn filter-btn" data-filter="ampla">Ampla</button>
                <button class="btn filter-btn" data-filter="negro">Negros</button>
                <button class="btn filter-btn" data-filter="pcd">PcD</button>
            </div>
        </div>
    </div>

    <!-- Tabela de Resultados -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Pos.</th>
                    <th>Nome</th>
                    <th>Segmento Origem</th>
                    <th>Nota</th>
                    <th>Status na Simulação</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div class="pagination">
        <div id="pagination-info" style="color: var(--text-muted); font-size: 0.9rem;"></div>
        <div id="pagination-controls"></div>
    </div>
</div>

// --- LÓGICA DO SISTEMA ---

let processedData = [];
let turmasConfig = [
    { id: 1, vagas: 750, label: "Primeira Turma" }
];

let currentPage = 1;
const itemsPerPage = 80;
let currentFilteredData = [];
let searchTimeout;

document.addEventListener('DOMContentLoaded', () => {
    renderTurmasConfig();
    processSimulation();
});

function escapeHTML(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderTurmasConfig() {
    const container = document.getElementById('turmas-container');
    container.innerHTML = turmasConfig.map((turma, index) => `
        <div class="turma-card">
            <div class="form-group">
                <label>Nome do Lote</label>
                <input type="text" value="${escapeHTML(turma.label)}" onchange="updateTurma(${turma.id}, 'label', this.value)">
            </div>
            <div class="form-group">
                <label>Qtd. Vagas</label>
                <input type="number" value="${turma.vagas}" onchange="updateTurma(${turma.id}, 'vagas', this.value)">
            </div>
            ${index > 0 ? `<button class="btn btn-danger" style="width:100%; margin-top:5px;" onclick="removeTurma(${turma.id})">Remover</button>` : ''}
        </div>
    `).join('');
}

function addTurma() {
    const newId = turmasConfig.length > 0 ? Math.max(...turmasConfig.map(t => t.id)) + 1 : 1;
    turmasConfig.push({ id: newId, vagas: 500, label: `Turma ${turmasConfig.length + 1}` });
    renderTurmasConfig();
}

function removeTurma(id) {
    turmasConfig = turmasConfig.filter(t => t.id !== id);
    renderTurmasConfig();
}

function updateTurma(id, field, value) {
    const turma = turmasConfig.find(t => t.id === id);
    if (turma) turma[field] = field === 'vagas' ? parseInt(value) || 0 : value;
}

function getGlobalLimits(upToTurmaId, rules) {
    let ampla = 0, negro = 0, pcd = 0;
    for (let r of rules) {
        if (r.id <= upToTurmaId) {
            ampla += r.amplaVagas;
            negro += r.negroVagas;
            pcd += r.pcdVagas;
        }
    }
    return { ampla, negro, pcd };
}

function allocateCandidates(rulesConfig, data) {
    let amplaCount = 0, negroCount = 0, pcdCount = 0;
    let result = [];

    for (let c of data) {
        let status = 'Cadastro de Reserva', type = 'cr', assignedTurma = 'cr', assignedLabel = 'CR';

        for (let i = 0; i < rulesConfig.length; i++) {
            let rule = rulesConfig[i];
            const global = getGlobalLimits(rule.id, rulesConfig);
            const isNegro = c.segmento.includes('Negro');
            const isPcD = c.segmento.includes('PcD');
            const isAmplaStr = c.segmento === 'Ampla';

            if (i === 0) { // Primeira Turma
                if (amplaCount < global.ampla) {
                    amplaCount++; status = `Aprovado - Ampla (${amplaCount}/${global.ampla})`;
                    type = 'ampla'; assignedTurma = rule.id; assignedLabel = rule.label; break;
                } else if (isNegro && negroCount < global.negro) {
                    negroCount++; status = `Aprovado - Negros (${negroCount}/${global.negro})`;
                    type = 'negro'; assignedTurma = rule.id; assignedLabel = rule.label; break;
                } else if (isPcD && pcdCount < global.pcd) {
                    pcdCount++; status = `Aprovado - PcD (${pcdCount}/${global.pcd})`;
                    type = 'pcd'; assignedTurma = rule.id; assignedLabel = rule.label; break;
                }
            } else { // Turmas seguintes
                if (isAmplaStr && amplaCount < global.ampla) {
                    amplaCount++; status = `Aprovado - Ampla (${amplaCount}/${global.ampla})`;
                    type = 'ampla'; assignedTurma = rule.id; assignedLabel = rule.label; break;
                } else if (!isAmplaStr) {
                    if (isNegro && negroCount < global.negro) {
                        negroCount++; status = `Aprovado - Negros (${negroCount}/${global.negro})`;
                        type = 'negro'; assignedTurma = rule.id; assignedLabel = rule.label; break;
                    } else if (isPcD && pcdCount < global.pcd) {
                        pcdCount++; status = `Aprovado - PcD (${pcdCount}/${global.pcd})`;
                        type = 'pcd'; assignedTurma = rule.id; assignedLabel = rule.label; break;
                    }
                }
            }
        }
        result.push({ ...c, status, type, turma_id: assignedTurma, turma_label: assignedLabel });
    }
    return result;
}

function processSimulation() {
    const totalVagas = turmasConfig.reduce((acc, t) => acc + (parseInt(t.vagas) || 0), 0);
    document.getElementById('total-vagas-badge').textContent = totalVagas;

    let turmasRules = turmasConfig.map(t => {
        const v = parseInt(t.vagas) || 0;
        return {
            id: t.id, label: t.label,
            amplaVagas: Math.round(v * 0.75),
            pcdVagas: Math.round(v * 0.05),
            negroVagas: v - Math.round(v * 0.75) - Math.round(v * 0.05)
        };
    });

    processedData = allocateCandidates(turmasRules, rawData);
    updateTurmaFilters();
    applyFilters();
}

function updateTurmaFilters() {
    const select = document.getElementById('turma-filter');
    let html = '<option value="all">Todas as Turmas</option>';
    turmasConfig.forEach(t => html += `<option value="${t.id}">${escapeHTML(t.label)}</option>`);
    html += '<option value="cr">Apenas CR</option>';
    select.innerHTML = html;
}

function applyFilters() {
    const cotaFilter = document.querySelector('.filter-btn.active').dataset.filter;
    const turmaFilter = document.getElementById('turma-filter').value;
    const searchTerm = document.getElementById('search-list').value.toLowerCase();

    currentFilteredData = processedData.filter(c => {
        if (cotaFilter !== 'all' && c.type !== cotaFilter) return false;
        if (turmaFilter !== 'all') {
            if (turmaFilter === 'cr' && c.turma_id !== 'cr') return false;
            if (turmaFilter !== 'cr' && String(c.turma_id) !== String(turmaFilter)) return false;
        }
        if (searchTerm && !c.nome.toLowerCase().includes(searchTerm) && !String(c.ordem).includes(searchTerm)) return false;
        return true;
    });

    currentPage = 1;
    renderTable();
}

function renderTable() {
    const tbody = document.getElementById('table-body');
    const total = currentFilteredData.length;
    
    if (total === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:50px;">Nenhum candidato encontrado.</td></tr>';
        return;
    }

    const start = (currentPage - 1) * itemsPerPage;
    const end = Math.min(start + itemsPerPage, total);
    const pageData = currentFilteredData.slice(start, end);

    tbody.innerHTML = pageData.map(c => `
        <tr id="row-${c.ordem}">
            <td style="color:var(--text-muted)">${c.ordem}º</td>
            <td style="font-weight:500">${escapeHTML(c.nome)}</td>
            <td style="font-size:0.85rem">${c.segmento}</td>
            <td style="font-weight:bold">${c.total}</td>
            <td>
                ${c.turma_id !== 'cr' ? `<span class="badge turma-tag">${escapeHTML(c.turma_label)}</span>` : ''}
                <span class="badge ${c.type}">${c.status}</span>
            </td>
        </tr>
    `).join('');

    document.getElementById('pagination-info').textContent = `Mostrando ${start+1}-${end} de ${total}`;
    renderPagination(Math.ceil(total / itemsPerPage));
}

function renderPagination(totalPages) {
    const container = document.getElementById('pagination-controls');
    let html = `<button class="page-btn" onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>&lt;</button>`;
    
    for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) {
        html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
    }

    html += `<button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>&gt;</button>`;
    container.innerHTML = html;
}

function changePage(p) { currentPage = p; renderTable(); }

function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(applyFilters, 300);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    };
});

// Simulador de Projeção Mestra
function simulateCandidate() {
    const input = document.getElementById('sim-input').value.trim().toLowerCase();
    const resDiv = document.getElementById('sim-result');
    if (!input) return;

    const target = processedData.find(c => String(c.ordem) === input || c.nome.toLowerCase().includes(input));
    if (!target) { resDiv.style.display='block'; resDiv.innerHTML="Candidato não encontrado."; return; }

    resDiv.style.display = 'block';
    if (target.type !== 'cr') {
        resDiv.innerHTML = `✅ <b>${target.nome}</b> já está convocado na <b>${target.turma_label}</b> como ${target.status}.`;
        return;
    }

    // Busca Binária para achar a vaga necessária
    let low = 1, high = 10000, best = -1, typeFound = '';
    while (low <= high) {
        let mid = Math.floor((low + high) / 2);
        let simRules = [...turmasConfig.map(t => ({...t, amplaVagas: Math.round(t.vagas*0.75), pcdVagas: Math.round(t.vagas*0.05), negroVagas: t.vagas - Math.round(t.vagas*0.75) - Math.round(t.vagas*0.05)})), 
        { id: 99, label: 'Turma Extra', amplaVagas: Math.round(mid*0.75), pcdVagas: Math.round(mid*0.05), negroVagas: mid - Math.round(mid*0.75) - Math.round(mid*0.05) }];
        
        let alloc = allocateCandidates(simRules, rawData);
        let simTarget = alloc.find(c => c.ordem === target.ordem);
        if (simTarget.type !== 'cr') { best = mid; typeFound = simTarget.type; high = mid - 1; }
        else { low = mid + 1; }
    }

    resDiv.innerHTML = `
        <b>Projeção para ${target.nome}:</b><br>
        Para ser chamado, o governo precisaria criar uma nova turma de no mínimo <b>${best} vagas</b>.<br>
        Ele entraria como: <span class="badge ${typeFound}">Aprovado - ${typeFound.toUpperCase()}</span>
    `;
}
</script>
